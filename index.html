<script>
let cacheIA = {};
let usoIA = 0;
let LIMITE_IA = 20;

function diagnosticoLocal(texto){
  texto = texto.toLowerCase();

  if(texto.includes("slave lost") || texto.includes("perdido")){
    return "🔎 Diagnóstico: Slave Lost.\n\n➡ Verifique:\n- Terminações do barramento\n- Cabo rompido\n- Tensão abaixo de 9V\n- Conexões frouxas";
  }

  if(texto.includes("sinal baixo") || texto.includes("baixo mv")){
    return "⚠️ Sinal baixo detectado.\n\n➡ Possíveis causas:\n- Cabo muito longo\n- Falta de terminador\n- Excesso de dispositivos\n- Problema de alimentação";
  }

  if(texto.includes("parametrização") || texto.includes("param")){
    return "⚙️ Erro de parametrização.\n\n➡ Verifique:\n- GSD correto\n- Configuração no mestre\n- Endereço duplicado";
  }

  if(texto.includes("jitter")){
    return "📡 Jitter alto.\n\n➡ Possíveis causas:\n- Ruído eletromagnético\n- Mau aterramento\n- Cabo inadequado";
  }

  if(texto.includes("tensão") || texto.includes("voltagem")){
    return "🔋 Problema de tensão.\n\n➡ Verifique:\n- Fonte (9V a 32V)\n- Queda no cabo\n- Consumo do segmento";
  }

  return null;
}

function precisaIA(texto){
  return texto.length > 80 || texto.includes("intermitente") || texto.includes("complexo");
}

function chamarIA(texto){
  usoIA++;

  let resposta = `
🤖 Diagnóstico avançado:

Analisando: "${texto}"

➡ Possíveis causas:
- Comunicação instável
- Ruído na rede
- Alimentação irregular

➡ Ações:
- Medir sinal no scope
- Verificar terminadores
- Conferir aterramento
`;

  cacheIA[texto] = resposta;
  return resposta;
}

function processarIA(){
  const inputEl = document.getElementById("ia-input");
  const output = document.getElementById("ia-result");

  if(!inputEl || !output) return;

  const input = inputEl.value.trim();

  if(!input){
    output.innerHTML = "<div class='ai-step'>Digite um problema.</div>";
    return;
  }

  if(cacheIA[input]){
    output.innerHTML = `<div class="ai-step success">${cacheIA[input]}</div>`;
    return;
  }

  const local = diagnosticoLocal(input);
  if(local){
    output.innerHTML = `<div class="ai-step success">${local}</div>`;
    return;
  }

  if(usoIA >= LIMITE_IA){
    output.innerHTML = `
    <div class="ai-step danger">
    ⚠️ Modo econômico ativado.<br><br>
    Limite diário atingido.<br>
    Usando diagnóstico local.
    </div>`;
    return;
  }

  const resposta = chamarIA(input);
  output.innerHTML = `<div class="ai-step">${resposta}</div>`;
}

// substitui botão IA existente sem quebrar nada
window.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("ia-send-btn");
  if(btn){
    btn.onclick = processarIA;
  }
});

  {

];

// 📊 DIAGNÓSTICO AUTOMÁTICO
// ===============================

function diagnosticoAutomatico(){
  let resultado = [];

  // exemplo usando variáveis simuladas
  let signal = window.signalLevel || 500;
  let lost = window.devicesLost || 0;

  if(signal < 400){
    resultado.push("⚠️ Sinal crítico (<400mVpp)");
  }

  if(lost > 0){
    resultado.push(`❌ ${lost} dispositivo(s) perdido(s)`);
  }

  if(resultado.length === 0){
    resultado.push("✅ Rede operando normalmente");
  }

  mostrarDiagnostico(resultado);
}

function mostrarDiagnostico(lista){
  const output = document.getElementById("ia-result");
  if(!output) return;

  let html = "";
  lista.forEach(item => {
    html += `<div class="ai-step">${item}</div>`;
  });

  output.innerHTML = html;
}

// rodar automático a cada 3s
setInterval(diagnosticoAutomatico, 3000);

</script>
